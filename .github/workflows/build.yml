name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    runs-on: ubuntu-latest

    env:
      MONGODB_URI: mongodb://localhost:27017/test
      JWT_SECRET: secret-key-that-is-at-least-32-characters-long
      JWT_REFRESH_SECRET: change-this-refresh-secret-with-at-least-32-characters
      JWT_ACCESS_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      REFRESH_MAX_ACTIVE_SESSIONS: 3
      CORS_ORIGINS_PATIENT: http://localhost:5173
      CORS_ORIGINS_STAFF: http://localhost:5174

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Test and coverage
        run: npm run test:cov

      - name: E2E tests
        run: npm run test:e2e -- --runInBand

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONARCLOUD_TOKEN }}
