name: Test & Deploy Backend

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: mongodb://localhost:27017/test
      JWT_SECRET: secret-key-that-is-at-least-32-characters-long
      JWT_REFRESH_SECRET: change-this-refresh-secret-with-at-least-32-characters
      JWT_ACCESS_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      REFRESH_MAX_ACTIVE_SESSIONS: 3
      CORS_ORIGINS_PATIENT: http://localhost:5173
      CORS_ORIGINS_STAFF: http://localhost:5174
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Unit tests with coverage
        run: npm run test:cov

      - name: E2E tests
        run: npm run test:e2e -- --runInBand

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Railway deploy
        env:
          WEBHOOK_URL: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::error::RAILWAY_DEPLOY_WEBHOOK secret is not configured. Add it in GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$WEBHOOK_URL")
          echo "Railway webhook response: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "::error::Railway webhook returned unexpected status: $HTTP_CODE"
            exit 1
          fi
