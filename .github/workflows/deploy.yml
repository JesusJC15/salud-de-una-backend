name: CI Backend

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

# Railway auto-deploys on push to main via GitHub integration.
# This workflow only gates quality: tests must pass before Railway picks up the commit.

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh mongodb://127.0.0.1:27017/admin --quiet --eval 'quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      MONGODB_URI: mongodb://localhost:27017/test
      JWT_SECRET: secret-key-that-is-at-least-32-characters-long
      JWT_REFRESH_SECRET: change-this-refresh-secret-with-at-least-32-characters
      JWT_ACCESS_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      REFRESH_MAX_ACTIVE_SESSIONS: 3
      CORS_ORIGINS_PATIENT: http://localhost:5173
      CORS_ORIGINS_STAFF: http://localhost:5174
      NODE_ENV: test
      AI_ENABLED: 'false'
      AI_REQUEST_TIMEOUT_MS: 20000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Validate environment
        run: npm run validate:env

      - name: Unit tests with coverage
        run: npm run test:cov

      - name: E2E tests
        run: npm run test:e2e -- --runInBand

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build runner image
        run: docker build --target runner -t salud-de-una-backend:ci .
