services:
  api:
    build:
      context: .
      target: runner
    env_file:
      - .env.production.docker
    environment:
      NODE_ENV: production
      APP_RUNTIME_ROLE: api
    init: true
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    healthcheck:
      test: ["CMD", "node", "docker/healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  worker:
    build:
      context: .
      target: runner
    env_file:
      - .env.production.docker
    environment:
      NODE_ENV: production
      APP_RUNTIME_ROLE: worker
    init: true
    restart: unless-stopped
    command: ["node", "dist/main"]
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
