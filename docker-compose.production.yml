services:
  app:
    build:
      context: .
      target: runner
    env_file:
      - .env.production.docker
    init: true
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    healthcheck:
      test: ["CMD", "node", "docker/healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
