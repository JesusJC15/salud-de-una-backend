version: "3.8"
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/salud-de-una
      JWT_SECRET: changeme
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo_data:
