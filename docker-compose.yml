services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "mongodb://127.0.0.1:27017/admin",
          "--quiet",
          "--eval",
          "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      target: runner
    init: true
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/salud-de-una}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set for docker-compose.yml}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set for docker-compose.yml}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      REFRESH_MAX_ACTIVE_SESSIONS: ${REFRESH_MAX_ACTIVE_SESSIONS:-3}
      CORS_ORIGINS_PATIENT: ${CORS_ORIGINS_PATIENT:-http://localhost:5173,http://localhost:8081,http://127.0.0.1:8081}
      CORS_ORIGINS_STAFF: ${CORS_ORIGINS_STAFF:-http://localhost:5174}
      ENABLE_BOOTSTRAP_ADMIN: ${ENABLE_BOOTSTRAP_ADMIN:-false}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-AdminP@ss1}
      BOOTSTRAP_ADMIN_FIRST_NAME: ${BOOTSTRAP_ADMIN_FIRST_NAME:-Admin}
      BOOTSTRAP_ADMIN_LAST_NAME: ${BOOTSTRAP_ADMIN_LAST_NAME:-System}
      REDIS_URL: ${REDIS_URL:-}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-salud-de-una-docker}
      OUTBOX_DISPATCH_INTERVAL_MS: ${OUTBOX_DISPATCH_INTERVAL_MS:-1000}
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "docker/healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  mongo_data:
